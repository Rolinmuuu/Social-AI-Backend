events {
    worker_connections 1024;
}

http {
    # Upstream definitions — service names must match docker-compose service names.
    upstream auth_service {
        server auth:8081;
    }
    upstream post_service {
        server post:8082;
    }
    upstream social_service {
        server social:8083;
    }
    upstream message_service {
        server message:8084;
    }

    # Rate limiting: 100 requests/second per IP, burst of 200.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    server {
        listen 80;

        # Pass real client IP to upstream services.
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Host             $host;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;

        limit_req zone=api_limit burst=200 nodelay;

        # ── Auth Service ──────────────────────────────────────────────────
        location = /signup {
            proxy_pass http://auth_service;
        }
        location = /signin {
            proxy_pass http://auth_service;
        }

        # ── Post Service ──────────────────────────────────────────────────
        location = /upload {
            client_max_body_size 50m;
            proxy_pass http://post_service;
        }
        location = /search {
            proxy_pass http://post_service;
        }
        location ~ ^/post(/.*)?$ {
            proxy_pass http://post_service;
        }

        # ── Social Service ────────────────────────────────────────────────
        location ~ ^/follow(/.*)?$ {
            proxy_pass http://social_service;
        }

        # ── Message Service ───────────────────────────────────────────────
        location = /message {
            proxy_pass http://message_service;
        }

        # ── Health / Metrics pass-through ─────────────────────────────────
        location = /health {
            return 200 '{"status":"gateway ok"}';
            add_header Content-Type application/json;
        }
    }
}
