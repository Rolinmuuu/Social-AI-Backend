services:
  # ── API Gateway ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - post
      - social
      - message

  # ── Microservices ─────────────────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000
    depends_on:
      - elasticsearch
      - logstash

  post:
    build:
      context: .
      dockerfile: services/post/Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - elasticsearch
      - redis
      - logstash
      - openai
      - kafka

  social:
    build:
      context: .
      dockerfile: services/social/Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000
    depends_on:
      - elasticsearch
      - logstash

  message:
    build:
      context: .
      dockerfile: services/message/Dockerfile
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000
    depends_on:
      - elasticsearch
      - logstash

  # ── Infrastructure ────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - auth
      - post
      - social
      - message

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # ── Log Pipeline (ELK) ────────────────────────────────────────────────────
  elasticsearch-logs:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"

  logstash:
    image: logstash:8.13.0
    ports:
      - "5000:5000"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch-logs

  kibana:
    image: kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch-logs:9200
    depends_on:
      - elasticsearch-logs

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS:PLAINTEXT_HOST://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true

  feed-worker:
    build:
      context: .
      dockerfile: services/feed/Dockerfile
    depends_on:
      - kafka
      - redis
      - elasticsearch
      - logstash
    environment:
      - KAFKA_BROKERS=kafka:9092
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000

  notification-worker:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    depends_on:
      - kafka
      - elasticsearch
      - logstash
    environment:
      - KAFKA_BROKERS=kafka:9092
      - ES_URL=http://elasticsearch:9200
      - ES_PASSWORD=${ES_PASSWORD}
      - LOGSTASH_ADDRESS=logstash:5000

volumes:
  es_data:
